<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Detalles de Amor | Tienda de Regalos</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --rose-pale: #fff5f7;
            --rose-soft: #ffe4e9;
            --rose-main: #f9c5d1;
            --rose-deep: #e6a4b4;
            --lavanda-pale: #faf5ff;
            --lavanda-soft: #f0e6f5;
            --lavanda-main: #d9c2e6;
            --lavanda-deep: #c0a0d4;
            --blanco: #ffffff;
            --gris-suave: #faf0f2;
            --texto-oscuro: #3d2b2f;
            --texto-claro: #8b6b72;
            --dorado: #e4b68b;
            --sombra: 0 12px 28px -8px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.02);
            --sombra-hover: 0 20px 32px -12px rgba(0, 0, 0, 0.12);
            --border-radius: 24px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--rose-pale);
            color: var(--texto-oscuro);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--rose-soft);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--lavanda-main);
            border-radius: 20px;
        }

        /* navbar con toque lila */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(255, 245, 247, 0.94);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(192, 160, 212, 0.3);
            padding: 0.9rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b9748a, #b17fc9);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo i {
            color: var(--lavanda-deep);
            font-size: 1.4rem;
            margin-right: 5px;
            background: none;
            background-clip: unset;
            -webkit-background-clip: unset;
            color: #c0a0d4;
        }
        .nav-categories {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .cat-btn {
            background: transparent;
            border: none;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: var(--texto-claro);
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-btn.active, .cat-btn:hover {
            background: linear-gradient(120deg, var(--rose-main), var(--lavanda-soft));
            color: #4a2e36;
        }
        .cart-icon {
            background: var(--blanco);
            border: 1px solid var(--lavanda-main);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--sombra);
        }
        .cart-icon:hover {
            background: var(--lavanda-soft);
            transform: scale(0.97);
            border-color: var(--lavanda-deep);
        }
        #cartCount {
            background: var(--lavanda-deep);
            border-radius: 30px;
            padding: 0.1rem 0.45rem;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
        }

        /* hero romántico (con sutil degradado lila) */
        .hero {
            text-align: center;
            padding: 3rem 1.5rem 2rem;
            background: radial-gradient(circle at 20% 30%, rgba(217, 194, 230, 0.12), transparent);
        }
        .hero-badge {
            background: var(--blanco);
            display: inline-block;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--lavanda-deep);
            box-shadow: var(--sombra);
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 7vw, 3.8rem);
            font-weight: 700;
            margin: 1rem 0 0.5rem;
            line-height: 1.2;
            color: #6b3e4a;
        }
        .hero p {
            color: var(--texto-claro);
            max-width: 500px;
            margin: 0 auto;
        }
        .divider-rose {
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, var(--rose-deep), var(--lavanda-main));
            margin: 1rem auto 0;
            border-radius: 4px;
        }

        /* sección principal */
        .container {
            padding: 1rem 5% 4rem;
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: inline-block;
            border-left: 5px solid var(--lavanda-main);
            padding-left: 1rem;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }
        .product-card {
            background: var(--blanco);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: var(--sombra);
            cursor: pointer;
            border: 1px solid rgba(217, 194, 230, 0.5);
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--sombra-hover);
            border-color: var(--lavanda-main);
        }
        .card-img {
            height: 260px;
            overflow: hidden;
            background: #fdeff2;
            position: relative;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .product-card:hover .card-img img {
            transform: scale(1.02);
        }
        .badge-cat {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255,255,245,0.92);
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b1687c;
            border-left: 3px solid var(--lavanda-main);
        }
        .card-body {
            padding: 1rem 1.2rem 1.2rem;
        }
        .card-body h3 {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }
        .price {
            font-weight: 700;
            font-size: 1.2rem;
            color: #c48498;
            margin: 0.3rem 0;
        }
        .ver-mas {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--lavanda-deep);
            letter-spacing: 1px;
        }
        .search-bar {
            margin-bottom: 2rem;
            display: flex;
            justify-content: flex-end;
        }
        .search-input {
            background: white;
            border: 1px solid #f2d9df;
            border-radius: 60px;
            padding: 0.7rem 1.2rem;
            width: 260px;
            outline: none;
            font-size: 0.85rem;
        }
        .search-input:focus {
            border-color: var(--lavanda-main);
            box-shadow: 0 0 0 2px rgba(192, 160, 212, 0.3);
        }
        /* modal producto */
        .modal-product {
            position: fixed;
            inset: 0;
            background: rgba(61,43,47,0.5);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-product.open {
            display: flex;
        }
        .modal-card {
            background: white;
            max-width: 900px;
            width: 100%;
            border-radius: 40px;
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            animation: fadeUp 0.3s;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: scale(0.96);}
            to { opacity: 1; transform: scale(1);}
        }
        .modal-img {
            flex: 1;
            min-width: 220px;
            background: #faeff2;
        }
        .modal-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .modal-info {
            flex: 1;
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .modal-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
        }
        .modal-price {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--lavanda-deep);
        }
        .stock-indicator {
            font-size: 0.8rem;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .stock-dot {
            width: 9px;
            height: 9px;
            border-radius: 9px;
            background: #a0c4a8;
        }
        .qty-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0.4rem 0;
        }
        .qty-input {
            width: 80px;
            padding: 8px;
            border-radius: 40px;
            border: 1px solid #f2cfd8;
            text-align: center;
        }
        .btn-add {
            background: linear-gradient(95deg, #e6a4b4, #c8aadd);
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-add:hover:not(:disabled) {
            background: linear-gradient(95deg, #c48498, #b488cf);
        }
        .close-modal-btn {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 1.8rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #946b78;
        }

        /* carrito lateral con acento lila */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            z-index: 300;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .cart-overlay.open {
            visibility: visible;
            opacity: 1;
        }
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: white;
            z-index: 310;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .cart-overlay.open .cart-sidebar {
            transform: translateX(0);
        }
        .cart-header {
            padding: 1.2rem;
            border-bottom: 1px solid #f3dfe4;
            display: flex;
            justify-content: space-between;
        }
        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .cart-item {
            display: flex;
            gap: 12px;
            background: #fff9fb;
            border-radius: 20px;
            padding: 0.7rem;
            border: 1px solid #fae3ea;
        }
        .cart-img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 16px;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-title {
            font-weight: 600;
            font-size: 0.85rem;
        }
        .cart-qty {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }
        .cart-qty button {
            background: #f5e3e8;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.1s;
        }
        .cart-qty button:hover {
            background: var(--lavanda-soft);
        }
        .cart-footer {
            border-top: 1px solid #f3dfe4;
            padding: 1rem;
        }
        .total {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
        }
        .btn-empty {
            background: none;
            border: none;
            color: #c48498;
            margin-top: 10px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .toast-msg {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #6b3e4a;
            color: white;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-size: 0.8rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            background: #cba2db;
            color: #2d1e23;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        footer {
            text-align: center;
            padding: 2rem;
            background: #ffeef2;
            color: #b38595;
            font-size: 0.75rem;
        }
        @media (max-width: 680px) {
            .navbar { flex-direction: column; align-items: stretch; }
            .nav-categories { justify-content: center; }
            .cart-icon { justify-content: center; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo"><i class="fas fa-heart"></i> Detalles de Amor</div>
        <div class="nav-categories">
            <button class="cat-btn active" data-cat="todos">Todo</button>
            <button class="cat-btn" data-cat="globos">Globos</button>
            <button class="cat-btn" data-cat="peluches">Peluches</button>
            <button class="cat-btn" data-cat="detalles">Detalles</button>
            <button class="cat-btn" data-cat="ropa">Ropa</button>
        </div>
        <div class="cart-icon" id="openCartBtn">
            <i class="fas fa-shopping-bag"></i> <span>Carrito</span> <span id="cartCount">0</span>
        </div>
    </header>

    <section class="hero">
        <div class="hero-badge"><i class="fas fa-gift"></i> Regalos con corazón</div>
        <h1>Pequeños gestos,<br>grandes amores</h1>
        <p>Globos, peluches, detalles y moda para celebrar cada momento especial.</p>
        <div class="divider-rose"></div>
    </section>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
            <h2 class="section-title">Colección encantada</h2>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar producto...">
        </div>
        <div class="product-grid" id="productGrid"></div>
    </main>

    <!-- modal producto -->
    <div id="productModal" class="modal-product">
        <div class="modal-card">
            <button class="close-modal-btn" id="closeModalBtn"><i class="fas fa-times-circle"></i></button>
            <div class="modal-img">
                <img id="modalImg" alt="producto">
            </div>
            <div class="modal-info">
                <h2 id="modalTitle"></h2>
                <div class="modal-price" id="modalPrice"></div>
                <div class="stock-indicator"><span class="stock-dot" id="stockDot"></span><span id="modalStockText"></span></div>
                <div class="qty-selector">
                    <label>Cantidad:</label>
                    <input type="number" id="modalQty" class="qty-input" value="1" min="1">
                </div>
                <button class="btn-add" id="modalAddBtn"><i class="fas fa-heart"></i> Añadir al carrito</button>
            </div>
        </div>
    </div>

    <!-- carrito lateral -->
    <div id="cartOverlay" class="cart-overlay">
        <div class="cart-sidebar">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-cart"></i> Mi pedido</h3>
                <button id="closeCartBtn" style="background:none; border:none; font-size:1.5rem;">✕</button>
            </div>
            <div class="cart-items-list" id="cartItemsList"></div>
            <div class="cart-footer">
                <div class="total">
                    <span>Total</span>
                    <span id="cartTotal">Q 0.00</span>
                </div>
                <button id="emptyCartBtn" class="btn-empty"><i class="fas fa-trash-alt"></i> Vaciar carrito</button>
                <button id="checkoutBtn" style="width:100%; background: linear-gradient(95deg, #e6a4b4, #c0a0d4); border:none; padding:12px; border-radius:40px; margin-top:12px; font-weight:600; color:white;">Confirmar pedido</button>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>
    <footer>✨ Detalles de Amor – Hecho con ternura para ti. Envíos a toda la ciudad ✨</footer>

    <script>
        // ---------- CATÁLOGO DE PRODUCTOS (Amplio con lila incluido) ----------
        const productos = [
            { id: 1, nombre: "Globo corazon metálico", precio: 45, existencias: 25, categoria: "globos", imagen: "https://images.unsplash.com/photo-1532722032754-4c8b35f6dd7c?auto=format&fit=crop&w=500&q=80", descripcion: "Globo con forma de corazón, acabado perlado, perfecto para sorpresas románticas." },
            { id: 2, nombre: "Globo numero 18 dorado", precio: 68, existencias: 12, categoria: "globos", imagen: "https://images.unsplash.com/photo-1574427660882-92d5a25b16f6?auto=format&fit=crop&w=500&q=80", descripcion: "Globo número dorado, ideal para cumpleaños y celebraciones." },
            { id: 3, nombre: "Peluche Oso Algodón", precio: 189, existencias: 8, categoria: "peluches", imagen: "https://images.unsplash.com/photo-1566454460308-755ffceb9de2?auto=format&fit=crop&w=500&q=80", descripcion: "Oso de peluche suavecito, material hipoalergénico." },
            { id: 4, nombre: "Peluche Conejo cupcake", precio: 159, existencias: 6, categoria: "peluches", imagen: "https://images.unsplash.com/photo-1543076495-0f412b467f4b?auto=format&fit=crop&w=500&q=80", descripcion: "Conejito con diseño de cupcake, ideal para detalle de pascua." },
            { id: 5, nombre: "Caja sorpresa luces led", precio: 275, existencias: 15, categoria: "detalles", imagen: "https://images.unsplash.com/photo-1607344645866-0090e4fe9ddb?auto=format&fit=crop&w=500&q=80", descripcion: "Caja decorativa con luz LED y espacio para carta." },
            { id: 6, nombre: "Taza personalizada", precio: 95, existencias: 30, categoria: "detalles", imagen: "https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?auto=format&fit=crop&w=500&q=80", descripcion: "Taza de cerámica con frase grabada, incluye estuche." },
            { id: 7, nombre: "Sudadera Amore", precio: 320, existencias: 9, categoria: "ropa", imagen: "https://images.unsplash.com/photo-1578768072156-4e6aa90f2f77?auto=format&fit=crop&w=500&q=80", descripcion: "Sudadera oversized bordado de corazón, 80% algodón." },
            { id: 8, nombre: "Playera Parejas", precio: 190, existencias: 18, categoria: "ropa", imagen: "https://images.unsplash.com/photo-1581655353564-df123a1eb9ea?auto=format&fit=crop&w=500&q=80", descripcion: "Playera unisex, diseño gráfico romántico." },
            { id: 9, nombre: "Globo Arcoíris", precio: 52, existencias: 20, categoria: "globos", imagen: "https://images.unsplash.com/photo-1559560732-9f3d8f6c6d9f?auto=format&fit=crop&w=500&q=80", descripcion: "Globo de látex arcoíris, tamaño grande." },
            { id: 10, nombre: "Peluche Dino rosa", precio: 210, existencias: 4, categoria: "peluches", imagen: "https://images.unsplash.com/photo-1626900697013-9a06e9cc6b82?auto=format&fit=crop&w=500&q=80", descripcion: "Dinosaurio de peluche color rosa pastel." },
            { id: 11, nombre: "Set de Globos Lavanda", precio: 79, existencias: 14, categoria: "globos", imagen: "https://images.unsplash.com/photo-1589308454468-6c87f1e382e3?auto=format&fit=crop&w=500&q=80", descripcion: "Pack 5 globos tonos lila y malva." },
            { id: 12, nombre: "Detalle Llavero amor eterno", precio: 35, existencias: 40, categoria: "detalles", imagen: "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?auto=format&fit=crop&w=500&q=80", descripcion: "Llavero acrílico con mensaje tierno." }
        ];

        let cart = [];
        let currentCategory = "todos";
        let searchTerm = "";
        let currentModalProduct = null;

        // DOM elements
        const productGrid = document.getElementById('productGrid');
        const searchInputEl = document.getElementById('searchInput');
        const catBtns = document.querySelectorAll('.cat-btn');
        const cartCountSpan = document.getElementById('cartCount');
        const openCartBtn = document.getElementById('openCartBtn');
        const cartOverlay = document.getElementById('cartOverlay');
        const closeCartBtn = document.getElementById('closeCartBtn');
        const cartItemsList = document.getElementById('cartItemsList');
        const cartTotalSpan = document.getElementById('cartTotal');
        const emptyCartBtn = document.getElementById('emptyCartBtn');
        const toast = document.getElementById('toastMsg');
        const modal = document.getElementById('productModal');
        const modalImg = document.getElementById('modalImg');
        const modalTitle = document.getElementById('modalTitle');
        const modalPriceEl = document.getElementById('modalPrice');
        const modalStockText = document.getElementById('modalStockText');
        const stockDot = document.getElementById('stockDot');
        const modalQty = document.getElementById('modalQty');
        const modalAddBtn = document.getElementById('modalAddBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const checkoutBtn = document.getElementById('checkoutBtn');

        function showToastMsg(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function saveCart() {
            localStorage.setItem('detallesAmorCartLila', JSON.stringify(cart));
        }

        function loadCart() {
            const stored = localStorage.getItem('detallesAmorCartLila');
            if (stored) {
                try {
                    cart = JSON.parse(stored);
                    if (!Array.isArray(cart)) cart = [];
                } catch(e) { cart = []; }
            }
            updateCartUI();
        }

        function getCartQty(id) {
            const item = cart.find(i => i.id === id);
            return item ? item.cantidad : 0;
        }

        function maxAvailable(product) {
            const inCart = getCartQty(product.id);
            return Math.max(0, product.existencias - inCart);
        }

        function addToCart(productId, cantidad) {
            const prod = productos.find(p => p.id === productId);
            if (!prod) return false;
            const inCart = getCartQty(productId);
            if (inCart + cantidad > prod.existencias) {
                showToastMsg(`Solo quedan ${prod.existencias - inCart} unidades de ${prod.nombre}`);
                return false;
            }
            const existing = cart.find(i => i.id === productId);
            if (existing) existing.cantidad += cantidad;
            else cart.push({ id: productId, cantidad });
            saveCart();
            updateCartUI();
            showToastMsg(`💗 ${prod.nombre} agregado al carrito`);
            return true;
        }

        function updateCartUI() {
            const totalItems = cart.reduce((s, i) => s + i.cantidad, 0);
            cartCountSpan.textContent = totalItems;
            renderCartSidebar();
            renderFilteredProducts(); 
        }

        function renderCartSidebar() {
            if (!cartItemsList) return;
            if (cart.length === 0) {
                cartItemsList.innerHTML = `<div style="text-align:center; padding:2rem; color:#b38595;"><i class="fas fa-heart-broken"></i> <br> Tu carrito está vacío</div>`;
                cartTotalSpan.textContent = "Q 0.00";
                return;
            }
            let total = 0;
            let html = '';
            for (let item of cart) {
                const prod = productos.find(p => p.id === item.id);
                if (!prod) continue;
                const subtotal = prod.precio * item.cantidad;
                total += subtotal;
                html += `
                    <div class="cart-item" data-id="${prod.id}">
                        <img class="cart-img" src="${prod.imagen}" alt="${prod.nombre}">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${prod.nombre}</div>
                            <div>Q ${prod.precio.toFixed(2)}</div>
                            <div class="cart-qty">
                                <button class="cart-dec" data-id="${prod.id}">-</button>
                                <span>${item.cantidad}</span>
                                <button class="cart-inc" data-id="${prod.id}">+</button>
                                <button class="cart-remove" data-id="${prod.id}" style="margin-left:8px; background:none; border:none; color:#c0a0d4;"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                        <div>Q ${subtotal.toFixed(2)}</div>
                    </div>
                `;
            }
            cartItemsList.innerHTML = html;
            cartTotalSpan.textContent = `Q ${total.toFixed(2)}`;

            document.querySelectorAll('.cart-dec').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.dataset.id);
                    const item = cart.find(i => i.id === id);
                    if (item && item.cantidad > 1) {
                        item.cantidad -= 1;
                        saveCart();
                        updateCartUI();
                    } else if (item) {
                        cart = cart.filter(i => i.id !== id);
                        saveCart();
                        updateCartUI();
                    }
                });
            });
            document.querySelectorAll('.cart-inc').forEach(btn => {
                const id = parseInt(btn.dataset.id);
                const prod = productos.find(p => p.id === id);
                const item = cart.find(i => i.id === id);
                if (item && prod && item.cantidad < prod.existencias) {
                    btn.addEventListener('click', () => {
                        item.cantidad += 1;
                        saveCart();
                        updateCartUI();
                    });
                } else if (item && prod) {
                    btn.addEventListener('click', () => showToastMsg(`Stock máximo ${prod.existencias}`));
                }
            });
            document.querySelectorAll('.cart-remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.dataset.id);
                    cart = cart.filter(i => i.id !== id);
                    saveCart();
                    updateCartUI();
                    showToastMsg("Producto eliminado");
                });
            });
        }

        function emptyCartAction() {
            if (cart.length === 0) return;
            cart = [];
            saveCart();
            updateCartUI();
            showToastMsg("Carrito vaciado");
        }

        function renderFilteredProducts() {
            let filtered = productos.filter(p => {
                const matchCat = currentCategory === "todos" || p.categoria === currentCategory;
                const matchSearch = p.nombre.toLowerCase().includes(searchTerm.toLowerCase()) || p.descripcion.toLowerCase().includes(searchTerm.toLowerCase());
                return matchCat && matchSearch;
            });
            productGrid.innerHTML = '';
            filtered.forEach(p => {
                const inCartQty = getCartQty(p.id);
                const available = p.existencias - inCartQty;
                const lowStock = available <= 3 && available > 0;
                const card = document.createElement('div');
                card.classList.add('product-card');
                card.innerHTML = `
                    <div class="card-img">
                        <img src="${p.imagen}" alt="${p.nombre}" loading="lazy">
                        <span class="badge-cat">${p.categoria.toUpperCase()}</span>
                    </div>
                    <div class="card-body">
                        <h3>${p.nombre}</h3>
                        <div class="price">Q ${p.precio.toFixed(2)}</div>
                        <div class="ver-mas">Ver detalle <i class="fas fa-arrow-right"></i></div>
                    </div>
                `;
                card.addEventListener('click', () => openModal(p));
                productGrid.appendChild(card);
            });
        }

        function openModal(product) {
            currentModalProduct = product;
            const maxAvail = maxAvailable(product);
            modalImg.src = product.imagen;
            modalTitle.textContent = product.nombre;
            modalPriceEl.textContent = `Q ${product.precio.toFixed(2)}`;
            const stockLeft = product.existencias - getCartQty(product.id);
            modalStockText.textContent = stockLeft > 0 ? `Stock: ${stockLeft} disponibles` : 'Agotado';
            stockDot.style.background = stockLeft <= 3 ? '#c0a0d4' : '#a5c9a2';
            modalQty.value = 1;
            modalQty.max = Math.max(1, maxAvail);
            if (maxAvail <= 0) {
                modalAddBtn.disabled = true;
                modalAddBtn.textContent = "Sin stock";
            } else {
                modalAddBtn.disabled = false;
                modalAddBtn.textContent = "Añadir al carrito";
            }
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModalFn() {
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }

        // Eventos
        catBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                catBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.cat;
                renderFilteredProducts();
            });
        });

        searchInputEl.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderFilteredProducts();
        });

        openCartBtn.addEventListener('click', () => cartOverlay.classList.add('open'));
        closeCartBtn.addEventListener('click', () => cartOverlay.classList.remove('open'));
        cartOverlay.addEventListener('click', (e) => { if (e.target === cartOverlay) cartOverlay.classList.remove('open'); });
        emptyCartBtn.addEventListener('click', emptyCartAction);
        closeModalBtn.addEventListener('click', closeModalFn);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModalFn(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModalFn(); cartOverlay.classList.remove('open'); } });

        modalAddBtn.addEventListener('click', () => {
            if (!currentModalProduct) return;
            let qty = parseInt(modalQty.value);
            if (isNaN(qty) || qty < 1) qty = 1;
            const maxQ = maxAvailable(currentModalProduct);
            if (qty > maxQ) {
                showToastMsg(`Máximo permitido: ${maxQ}`);
                return;
            }
            addToCart(currentModalProduct.id, qty);
            closeModalFn();
            renderFilteredProducts();
        });

        checkoutBtn.addEventListener('click', () => {
            if (cart.length === 0) showToastMsg("Añade productos antes de finalizar");
            else showToastMsg("💜 ¡Gracias por tu compra! Pronto recibirás tu pedido.");
        });

        loadCart();
        renderFilteredProducts();
    </script>
</body>
</html>
