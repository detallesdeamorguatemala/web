<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Seci | Tienda en Línea</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Variables ─────────────────────────────── */
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black:   #0e0e0e;
            --white:   #f5f3ef;
            --accent:  #c9a84c;
            --red:     #c0392b;
            --green:   #1a7a6b;
            --mid:     #6b6560;
            --card-bg: #ffffff;
            --shadow:  0 8px 32px rgba(14,14,14,.08);
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--white);
            color: var(--black);
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            min-height: 100vh;
        }

        /* ── Navbar ────────────────────────────────────────── */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.1rem 6%;
            background: var(--black);
            color: var(--white);
            position: sticky;
            top: 0;
            z-index: 200;
            border-bottom: 2px solid var(--accent);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.45rem;
            font-weight: 900;
            letter-spacing: .04em;
            color: var(--white);
        }
        .logo span { color: var(--accent); }

        nav { display: flex; align-items: center; gap: 1.5rem; }

        nav a {
            color: rgba(245,243,239,.7);
            text-decoration: none;
            font-size: .88rem;
            font-weight: 500;
            letter-spacing: .08em;
            text-transform: uppercase;
            transition: color .2s;
        }
        nav a:hover { color: var(--accent); }

        .cart-btn {
            background: none;
            border: 1.5px solid rgba(245,243,239,.35);
            color: var(--white);
            font-size: .9rem;
            padding: .45rem .9rem;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: .4rem;
            transition: border-color .2s, background .2s;
            font-family: 'DM Sans', sans-serif;
        }
        .cart-btn:hover { border-color: var(--accent); background: rgba(201,168,76,.08); }

        #cartCount {
            background: var(--accent);
            color: var(--black);
            font-size: .72rem;
            font-weight: 700;
            padding: .1rem .42rem;
            border-radius: 50px;
        }

        /* ── Hero Strip ────────────────────────────────────── */
        .hero {
            text-align: center;
            padding: 4rem 6% 3rem;
        }

        .hero-tag {
            display: inline-block;
            font-size: .72rem;
            font-weight: 500;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: .25rem .8rem;
            border-radius: 50px;
            margin-bottom: 1rem;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.4rem, 6vw, 4.5rem);
            font-weight: 900;
            line-height: 1.08;
            letter-spacing: -.01em;
            color: var(--black);
        }

        .hero p {
            margin-top: .9rem;
            color: var(--mid);
            font-size: 1rem;
            max-width: 420px;
            margin-inline: auto;
        }

        .divider {
            width: 48px;
            height: 2px;
            background: var(--accent);
            margin: 2rem auto 0;
        }

        /* ── Product Grid ──────────────────────────────────── */
        .container { padding: 2.5rem 6% 5rem; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 28px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform .25s, box-shadow .25s;
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 48px rgba(14,14,14,.13);
        }

        .card-img-wrap {
            position: relative;
            overflow: hidden;
            height: 280px;
        }
        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .45s ease;
            display: block;
        }
        .product-card:hover .card-img-wrap img { transform: scale(1.05); }

        .card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--black);
            color: var(--white);
            font-size: .68rem;
            font-weight: 500;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .25rem .65rem;
            border-radius: 4px;
        }
        .card-badge.low { background: var(--red); }

        .card-body { padding: 16px 18px 20px; }

        .card-body h3 {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .price {
            color: var(--black);
            font-size: 1.15rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .ver-mas {
            font-size: .75rem;
            font-weight: 500;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--accent);
        }

        /* ── Modal ─────────────────────────────────────────── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(14,14,14,.65);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal.open { display: flex; }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 820px;
            border-radius: 14px;
            position: relative;
            padding: 28px;
            animation: slideIn .28s cubic-bezier(.22,1,.36,1);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from { transform: translateY(40px) scale(.97); opacity: 0; }
            to   { transform: translateY(0)   scale(1);    opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 16px; right: 20px;
            font-size: 1.6rem;
            line-height: 1;
            cursor: pointer;
            color: var(--mid);
            background: none;
            border: none;
            transition: color .2s;
            font-family: inherit;
        }
        .close-btn:hover { color: var(--black); }

        .modal-body {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        .modal-body img {
            flex: 1;
            min-width: 230px;
            max-width: 340px;
            height: 380px;
            object-fit: cover;
            border-radius: 10px;
        }

        .modal-info {
            flex: 2;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: .85rem;
        }

        .modal-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 700;
            line-height: 1.15;
        }

        .modal-info .price {
            font-size: 1.65rem;
            color: var(--black);
        }

        .modal-info .description {
            color: var(--mid);
            font-size: .95rem;
            line-height: 1.65;
        }

        .stock-row {
            font-size: .85rem;
            color: var(--mid);
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .stock-row .stock-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .add-to-cart {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 14px 22px;
            font-size: .95rem;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: .04em;
            border-radius: 8px;
            cursor: pointer;
            transition: background .2s, transform .15s;
            margin-top: .4rem;
        }
        .add-to-cart:hover { background: #2a2a2a; }
        .add-to-cart:active { transform: scale(.98); }
        .add-to-cart:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* ── Toast ─────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--black);
            color: var(--white);
            padding: .75rem 1.4rem;
            border-radius: 50px;
            font-size: .88rem;
            font-weight: 500;
            border-left: 3px solid var(--accent);
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s, transform .3s;
            z-index: 2000;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Footer ────────────────────────────────────────── */
        footer {
            text-align: center;
            padding: 2rem;
            background: var(--black);
            color: rgba(245,243,239,.4);
            font-size: .8rem;
            letter-spacing: .06em;
            text-transform: uppercase;
        }
        footer span { color: var(--accent); }

        /* ── Responsive ────────────────────────────────────── */
        @media (max-width: 600px) {
            .hero h1 { font-size: 2.2rem; }
            .modal-body img { max-width: 100%; height: 240px; }
            .modal-info h2 { font-size: 1.4rem; }
            nav a { display: none; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">Proyecto <span>Seci</span></div>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Catálogo</a>
            <button class="cart-btn" id="cartBtn">
                🛒 Carrito <span id="cartCount">0</span>
            </button>
        </nav>
    </header>

    <!-- Hero -->
    <section class="hero">
        <span class="hero-tag">Temporada 2025</span>
        <h1>Nueva<br>Colección</h1>
        <p>Prendas pensadas para durar. Estilo sin esfuerzo, calidad sin compromiso.</p>
        <div class="divider"></div>
    </section>

    <!-- Grid de productos -->
    <main class="container">
        <div class="product-grid" id="productGrid"></div>
    </main>

    <!-- Modal / Ficha del producto -->
    <div id="productModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn" aria-label="Cerrar">&times;</button>
            <div class="modal-body">
                <img id="modalImg" src="" alt="">
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <p class="price" id="modalPrice"></p>
                    <p class="description" id="modalDesc"></p>
                    <div class="stock-row">
                        <span class="stock-dot" id="stockDot"></span>
                        <span id="modalStock"></span>
                    </div>
                    <button class="add-to-cart" id="btnAddToCart">Añadir al Carrito</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast de confirmación -->
    <div class="toast" id="toast"></div>

    <!-- Footer -->
    <footer>
        &copy; 2025 <span>Proyecto Seci</span> — Todos los derechos reservados
    </footer>

    <script>
        /* ── Datos de productos ───────────────────────── */
        const productos = [
            {
                id: 1,
                nombre: "Hoodie OverSized Negro",
                precio: 299.00,
                existencias: 12,
                imagen: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=500&q=80",
                descripcion: "Hoodie 100% algodón, estilo oversized perfecto para el clima frío. Diseño minimalista sin estampados."
            },
            {
                id: 2,
                nombre: "Chaqueta de Mezclilla Vintage",
                precio: 450.00,
                existencias: 5,
                imagen: "https://images.unsplash.com/photo-1495105787522-5334e3ffa0ef?auto=format&fit=crop&w=500&q=80",
                descripcion: "Chaqueta denim con desgaste natural. Corte clásico, ideal para combinar con cualquier outfit."
            },
            {
                id: 3,
                nombre: "Playera Básica Blanca",
                precio: 120.00,
                existencias: 34,
                imagen: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=500&q=80",
                descripcion: "Playera de cuello redondo. Tela transpirable y costuras reforzadas."
            }
        ];

        /* ── Estado del carrito ───────────────────────── */
        const carrito = {};
        let productoActual = null;

        /* ── DOM refs ────────────────────────────────── */
        const productGrid   = document.getElementById('productGrid');
        const modal         = document.getElementById('productModal');
        const closeBtn      = document.getElementById('closeBtn');
        const modalTitle    = document.getElementById('modalTitle');
        const modalImg      = document.getElementById('modalImg');
        const modalPrice    = document.getElementById('modalPrice');
        const modalDesc     = document.getElementById('modalDesc');
        const modalStock    = document.getElementById('modalStock');
        const stockDot      = document.getElementById('stockDot');
        const btnAddToCart  = document.getElementById('btnAddToCart');
        const cartCount     = document.getElementById('cartCount');
        const toast         = document.getElementById('toast');

        /* ── Render tarjetas ─────────────────────────── */
        function renderProducts() {
            productos.forEach(p => {
                const lowStock = p.existencias < 10;
                const card = document.createElement('div');
                card.classList.add('product-card');
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.setAttribute('aria-label', `Ver detalles de ${p.nombre}`);
                card.innerHTML = `
                    <div class="card-img-wrap">
                        <img src="${p.imagen}" alt="${p.nombre}" loading="lazy">
                        <span class="card-badge ${lowStock ? 'low' : ''}">
                            ${lowStock ? '¡Pocas unidades!' : 'Disponible'}
                        </span>
                    </div>
                    <div class="card-body">
                        <h3>${p.nombre}</h3>
                        <div class="card-footer">
                            <span class="price">Q ${p.precio.toFixed(2)}</span>
                            <span class="ver-mas">Ver más →</span>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => openModal(p));
                card.addEventListener('keydown', e => { if (e.key === 'Enter') openModal(p); });
                productGrid.appendChild(card);
            });
        }

        /* ── Abrir modal ─────────────────────────────── */
        function openModal(p) {
            productoActual = p;
            const lowStock = p.existencias < 10;
            const sinStock = p.existencias === 0;

            modalTitle.textContent = p.nombre;
            modalImg.src           = p.imagen;
            modalImg.alt           = p.nombre;
            modalPrice.textContent = `Q ${p.precio.toFixed(2)}`;
            modalDesc.textContent  = p.descripcion;

            if (sinStock) {
                modalStock.textContent     = 'Sin existencias';
                stockDot.style.background  = '#ccc';
                btnAddToCart.disabled      = true;
                btnAddToCart.textContent   = 'Agotado';
            } else {
                modalStock.textContent     = `${p.existencias} unidades disponibles`;
                stockDot.style.background  = lowStock ? 'var(--red)' : 'var(--green)';
                btnAddToCart.disabled      = false;
                btnAddToCart.textContent   = 'Añadir al Carrito';
            }

            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        /* ── Cerrar modal ────────────────────────────── */
        function closeModal() {
            modal.classList.remove('open');
            document.body.style.overflow = '';
            productoActual = null;
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        /* ── Añadir al carrito ───────────────────────── */
        btnAddToCart.addEventListener('click', () => {
            if (!productoActual) return;
            const id = productoActual.id;
            carrito[id] = (carrito[id] || 0) + 1;
            actualizarContador();
            showToast(`"${productoActual.nombre}" añadido al carrito`);
            closeModal();
        });

        function actualizarContador() {
            const total = Object.values(carrito).reduce((a, b) => a + b, 0);
            cartCount.textContent = total;
        }

        /* ── Toast ───────────────────────────────────── */
        let toastTimer;
        function showToast(msg) {
            clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
        }

        /* ── Init ────────────────────────────────────── */
        renderProducts();
    </script>
</body>
</html>
